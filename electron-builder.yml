appId: com.taylos.app
productName: Taylos

afterPack: ./scripts/afterPack.js
afterSign: ./scripts/notarize.js
# Custom URL scheme for deep linking (auth callback from web)
protocols:
  - name: Taylos
    schemes:
      - taylos
files:
  - dist/main/**
  - dist/renderer/**
  - src/main/assets/**
  - "!dist/win-unpacked/**"
  - "!dist/*.exe"
  - "!dist/*.dmg"
  - "!dist/*.zip"
  - "!dist/mac*/**"
asarUnpack:
  - "src/main/assets/SystemAudioDump"
  - "src/main/assets/WASAPILoopback.exe"
# Run afterPack script to sign SystemAudioDump with entitlements
mac:
  icon: src/main/assets/icon-mac.png
  category: public.app-category.productivity
  artifactName: "Taylos.${ext}"
  hardenedRuntime: true
  notarize: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  extendInfo:
    LSUIElement: false # Ensure app shows in Dock
    ElectronTeamID: ${APPLE_TEAM_ID} # Set via env var when signing
    NSMicrophoneUsageDescription: "Taylos needs access to your microphone to transcribe your voice in meetings."
    NSScreenCaptureUsageDescription: "Taylos needs access to screen recording to capture system audio from meetings and calls."
    NSCameraUsageDescription: "Taylos may need camera access for screen recording functionality."
  target:
    - target: dir
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal

win:
  target:
    - target: nsis
      # portable removed for public releases - NSIS installer + auto-update is the clean path
  icon: build/icon.ico
  artifactName: "Taylos.${ext}"
  forceCodeSigning: true
  signAndEditExecutable: true
  signtoolOptions:
    publisherName:
      - "Benedict Kroetz"
    certificateSha1: "DADDA45A4EB8CF72E6E9A85A86554D3DA1A811D6"
    signingHashAlgorithms:
      - sha256

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false

portable:
  artifactName: "Taylos-Portable-${version}.${ext}"

dmg:
  format: UDZO
  writeUpdateInfo: true
  artifactName: "Taylos.${ext}"
