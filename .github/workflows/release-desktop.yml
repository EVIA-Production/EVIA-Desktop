name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      notarize:
        description: "Run Apple notarization (disable only for fast internal test builds)"
        required: false
        default: true
        type: boolean
      split_publish:
        description: "Split build+publish into separate steps (debug only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate macOS signing certificate secret
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${CSC_LINK:-}" ]]; then
            echo "::error::MAC_CSC_LINK is empty."
            exit 1
          fi

          if [[ -z "${CSC_KEY_PASSWORD:-}" ]]; then
            echo "::error::MAC_CSC_KEY_PASSWORD is empty."
            exit 1
          fi

          TMP_P12="$RUNNER_TEMP/macos-signing-cert.p12"

          if [[ "$CSC_LINK" =~ ^https?:// ]]; then
            curl --fail --silent --show-error --location "$CSC_LINK" --output "$TMP_P12"
          else
            if [[ "$CSC_LINK" =~ ^data:.*base64, ]]; then
              CSC_LINK="${CSC_LINK#*,}"
            fi

            if ! printf '%s' "$CSC_LINK" | openssl base64 -d -A -out "$TMP_P12" 2>/tmp/csc_decode_error.log; then
              echo "::error::MAC_CSC_LINK is not a valid base64 PKCS12 payload."
              cat /tmp/csc_decode_error.log || true
              exit 1
            fi
          fi

          echo "::add-mask::$CSC_LINK"
          {
            echo "CSC_LINK_CLEAN=$CSC_LINK"
          } >> "$GITHUB_ENV"

          if [[ ! -s "$TMP_P12" ]]; then
            echo "::error::Decoded PKCS12 file is empty."
            exit 1
          fi

          if ! openssl pkcs12 -in "$TMP_P12" -passin "pass:${CSC_KEY_PASSWORD}" -nokeys >/dev/null 2>/tmp/csc_pkcs12_error.log; then
            echo "::error::MAC_CSC_KEY_PASSWORD does not unlock MAC_CSC_LINK PKCS12."
            cat /tmp/csc_pkcs12_error.log || true
            exit 1
          fi

          echo "PKCS12 preflight passed."

      - name: Validate Apple notarization credentials
        if: matrix.os == 'macos-latest' && (github.event_name != 'workflow_dispatch' || inputs.notarize)
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=()
          [[ -z "${APPLE_ID:-}" ]] && missing+=("APPLE_ID")
          [[ -z "${APPLE_ID_PASSWORD:-}" ]] && missing+=("APPLE_ID_PASSWORD")
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=("APPLE_TEAM_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing notarization secrets: ${missing[*]}"
            exit 1
          fi

          if ! xcrun notarytool history --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" >/tmp/notary_preflight.log 2>&1; then
            echo "::error::Apple notarization credentials are invalid. APPLE_ID_PASSWORD must be an app-specific password."
            cat /tmp/notary_preflight.log || true
            exit 1
          fi

          echo "Notary credentials preflight passed."

      - name: Build and publish release artifacts
        if: github.event_name != 'workflow_dispatch' || inputs.split_publish != true
        run: |
          npm run build:main
          npm run build:renderer
          npx electron-builder --mac dmg zip --universal --publish always --config.publish.provider=github --config.publish.owner="${{ github.repository_owner }}" --config.publish.repo="${{ github.event.repository.name }}" --config.publish.releaseType=release --config.publish.timeout=600000
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          CSC_LINK: ${{ env.CSC_LINK_CLEAN }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_ID_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
          NOTARIZE_ENABLED: ${{ github.event_name != 'workflow_dispatch' || inputs.notarize }}

      - name: Build release artifacts (split mode)
        if: github.event_name == 'workflow_dispatch' && inputs.split_publish == true
        run: |
          npm run build:main
          npm run build:renderer
          npx electron-builder --mac dmg zip --universal --publish never
          echo "Built artifacts:"
          ls -lah dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          CSC_LINK: ${{ env.CSC_LINK_CLEAN }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_ID_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
          NOTARIZE_ENABLED: ${{ github.event_name != 'workflow_dispatch' || inputs.notarize }}

      - name: Publish release artifacts (split mode)
        if: github.event_name == 'workflow_dispatch' && inputs.split_publish == true
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          TITLE="Taylos ${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists - uploading with --clobber"
          else
            echo "Creating release $TAG"
            gh release create "$TAG" --title "$TITLE" --notes "Automated desktop release"
          fi

          mapfile -d '' FILES < <(find dist -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.yml" -o -name "*.blockmap" \) -print0)
          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "::error::No release files found in dist/"
            exit 1
          fi

          printf 'Uploading %s file(s)\n' "${#FILES[@]}"
          gh release upload "$TAG" "${FILES[@]}" --clobber
          gh release view "$TAG"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-desktop-dist
          path: dist/*
          if-no-files-found: warn
